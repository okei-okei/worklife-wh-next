<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 1400" role="img" aria-label="Photo inspired original New Zealand mountain lake landscape">
  <defs>
    <filter id="softGrain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" seed="14" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
    <filter id="distantBlur">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6fb8ed"/>
      <stop offset="0.38" stop-color="#a9d9f2"/>
      <stop offset="0.72" stop-color="#f4f8f3"/>
      <stop offset="1" stop-color="#fff1cf"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="64%" cy="22%" r="40%">
      <stop offset="0" stop-color="#fff9cf" stop-opacity="0.95"/>
      <stop offset="0.34" stop-color="#fff3b0" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mountainNear" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#637c81"/>
      <stop offset="0.52" stop-color="#294b4f"/>
      <stop offset="1" stop-color="#16383b"/>
    </linearGradient>
    <linearGradient id="mountainFar" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#9db4ba"/>
      <stop offset="1" stop-color="#5e7a7e"/>
    </linearGradient>
    <linearGradient id="forest" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2d8a62"/>
      <stop offset="0.45" stop-color="#176149"/>
      <stop offset="1" stop-color="#0d3e38"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d6f8e"/>
      <stop offset="0.45" stop-color="#159bb1"/>
      <stop offset="0.78" stop-color="#73d5d2"/>
      <stop offset="1" stop-color="#d7f7ec"/>
    </linearGradient>
    <linearGradient id="shore" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e9c381"/>
      <stop offset="0.55" stop-color="#d99f58"/>
      <stop offset="1" stop-color="#f3d9a4"/>
    </linearGradient>
  </defs>

  <g filter="url(#softGrain)">
    <rect width="2200" height="1400" fill="url(#sky)"/>
    <rect width="2200" height="880" fill="url(#sunGlow)"/>

    <g opacity="0.42" filter="url(#distantBlur)">
